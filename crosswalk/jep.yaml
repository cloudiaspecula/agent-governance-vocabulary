# JEP (Judgment Event Protocol) → Agent Governance Vocabulary Crosswalk
# =============================================================================
# Spec: draft-wang-jep-judgment-event-protocol-06
# I-D URL: https://datatracker.ietf.org/doc/draft-wang-jep-judgment-event-protocol/
# Repository: https://github.com/hjs-spec/jep
# Canonicalization: JCS (RFC 8785)
# Signature: Detached JWS (RFC 7515) over JCS-canonicalized unsigned event
# Algorithm policy: profile-defined / algorithm-agile
# Companion draft: draft-wang-jep-profiles-00
# =============================================================================
# Contributor: @schchit
# Date: 2026-04-15
# Updated: 2026-05-13 for JEP draft-06
# Status: Proposed (v0.1), draft-06 refresh
# =============================================================================

system:
  name: jep
  home: "https://datatracker.ietf.org/doc/draft-wang-jep-judgment-event-protocol/"
  repo: "https://github.com/hjs-spec/jep"

license: Apache-2.0

maintainer:
  github: schchit
  confirmed_at: "2026-04-15"
  refreshed_at: "2026-05-13"

version: "draft-06"
jep_core_version: "0.6"
wire_version: "1"

spec_url: "https://datatracker.ietf.org/doc/draft-wang-jep-judgment-event-protocol/"
profile_spec_url: "https://datatracker.ietf.org/doc/draft-wang-jep-profiles/"
repository: "https://github.com/hjs-spec/jep"

canonicalization: "jcs_rfc8785"
signature: "detached_jws_over_jcs"
signature_alg: "profile_defined"
signature_notes: "JEP-Core uses detached JWS over JCS-canonicalized unsigned event payloads. Concrete signature algorithms, key types, hash algorithms, and acceptability policies are selected by JOSE headers, conformance profiles, and trust profiles."

hash_algorithms:
  required_to_support:
    - "sha256"
  notes: "JEP-Core-0.6 requires support for sha256 algorithm-tagged digest strings. Additional digest algorithms may be defined by conformance profiles, trust profiles, or registered extensions."

companion_drafts:
  - "draft-wang-jep-profiles-00"
  - "draft-wang-jep-conformance-00"

# -----------------------------------------------------------------------------
# Field Mappings
# -----------------------------------------------------------------------------
mappings:
  # --- Core Event Fields ---
  - canonical: agent_did
    internal: who
    match: partial
    partial_reason: "JEP's 'who' field is an actor identifier claimed by the event. It may be a DID under a DID/VC profile, but JEP-Core is identity-system-neutral and does not require DID support."

  - canonical: issuer_did
    internal: who
    match: partial
    partial_reason: "For JEP events, 'who' identifies the claimed actor. The signer/key holder is not necessarily identical to the actor; actor/key binding is defined by a trust profile. This maps to issuer_did only when the deployment profile uses DID-based issuer identity."

  - canonical: attestation_timestamp
    internal: when
    match: exact
    notes: "Actor-supplied event timestamp, Unix epoch seconds. Freshness, replay windows, and archival interpretation are validation-mode and trust-profile dependent."

  - canonical: delegation_chain_hash
    internal: ref
    match: partial
    partial_reason: "JEP's 'ref' field is a typed or cryptographic reference to another event, chain, digest, credential, policy, evidence, context, archive receipt, or external object. It may carry a delegation-chain hash under a suitable chain/profile interpretation, but JEP-Core does not make every reference a delegation chain."

  - canonical: wallet_binding
    internal: aud
    match: partial
    partial_reason: "JEP's 'aud' field is an intended audience or validation context. It maps to wallet_binding only when the audience is a wallet-bound entity under an external profile. JEP-Core itself is wallet-agnostic."

  - canonical: expires_at
    internal: (extension)
    match: no_mapping
    notes: "JEP-Core has no required top-level expiration field. Freshness and replay checks are validation-mode and profile dependent; expiration-like semantics may be supplied by extensions or profiles."

  # --- Decision Trajectory Primitives ---
  - canonical: decision_lineage
    internal: ref chain
    match: partial
    partial_reason: "JEP references can support verifiable lineage between observed event objects, but richer DAG, Merkle, causal graph, responsibility-chain, or workflow-accountability semantics remain profile- or extension-defined. A JEP reference does not by itself imply causality or complete-log coverage."

  - canonical: baseline_revision
    internal: (none)
    match: no_mapping
    notes: "JEP does not track behavioral baselines. Baseline revision belongs to higher-layer governance, reputation, or drift-detection systems."

  - canonical: divergence_signal
    internal: (none)
    match: no_mapping
    notes: "JEP records judgment-related events but does not compute divergence from a behavioral baseline."

  - canonical: trust_velocity
    internal: (none)
    match: no_mapping
    notes: "JEP does not compute trust scores or trust velocity. These remain higher-layer derived signals."

  # --- Constraints ---
  - canonical: observation_window
    internal: (none)
    match: no_mapping
    notes: "JEP events are point-in-time records. Replay and freshness windows exist for validation, but JEP-Core does not define a behavioral observation_window primitive."

  # --- Verbs as Decision Semantics ---
  - canonical: decision_trajectory
    internal: verb
    match: partial
    partial_reason: "JEP's four immutable verbs (J/D/T/V) provide protocol-level structure for judgment-related acts. 'J' records judgment, 'D' records delegation, 'T' records termination, and 'V' records verification. This is more granular than a single decision primitive but less comprehensive than a full state machine or decision trajectory model."

  # --- Explicit Gaps (Honest no_mappings) ---
  - canonical: behavioral_trust
    internal: (none)
    match: no_mapping
    notes: "JEP records protocol-level facts about judgment-related acts; it does not compute behavioral trust scores."

  - canonical: compliance_risk
    internal: (none)
    match: no_mapping
    notes: "JEP-Core does not evaluate compliance risk. Policy or regulatory conclusions require profile-defined evidence rules and Level 4 policy validation."

  - canonical: wallet_state
    internal: (none)
    match: no_mapping
    notes: "JEP-Core is wallet-agnostic."

  - canonical: settlement_witness
    internal: (none)
    match: no_mapping
    notes: "JEP records decision-related events, not settlement outcomes."

  - canonical: physical_constraint
    internal: (none)
    match: no_mapping
    notes: "JEP-Core has no physical constraint layer. Physical, environmental, or RATS-style evidence may be referenced by profiles or extensions."

  # --- Protocol / Validator Mechanisms Not Promoted to Canonical Vocabulary ---
  - canonical: "(none)"
    internal: nonce
    match: no_mapping
    notes: "JEP's anti-replay nonce is a protocol security mechanism, not a governance primitive. It is evaluated in actor/audience/profile/replay-window context."

  - canonical: "(none)"
    internal: ext_crit
    match: no_mapping
    notes: "JEP's critical-extension list is a validator mechanism. Unknown critical extensions cause rejection, but ext_crit is not promoted to the canonical vocabulary in v0.1."

  - canonical: "(none)"
    internal: validation_result
    match: no_mapping
    notes: "JEP validators return structured validation results with level, mode, profile, event_hash, warnings, and errors. This is a protocol validation output, not a canonical governance signal in v0.1."

# -----------------------------------------------------------------------------
# Descriptor Dimensions for JEP Events
# -----------------------------------------------------------------------------
descriptor_dimensions:
  enforcement_class: "binding"  # JEP binds an event payload to a signature/key claim under a trust profile. This is protocol-level binding, not legal non-repudiation, authorization validity, or policy compliance by itself.
  validity_temporal: "at_issuance"  # The event records an actor-supplied timestamp. Acceptance freshness, archival validity, and historical key validity are validation-mode and profile dependent.
  refusal_authority: "verifier"  # A verifier can reject invalid JEP events or insufficient validation levels. Final action refusal may still live with consumer policy or deployment policy.
  invariant_survival: "permanent"  # Event hashes and signatures preserve payload-integrity commitments over time, subject to archival assumptions and cryptographic algorithm status.
  replay_class: "decision_replay"  # A verifier can replay protocol validation of the signed decision event, but not necessarily reconstruct the full external decision context.
  governed_action_class: "compose"  # JEP events compose into judgment, delegation, termination, verification, and accountability chains; JEP-Core records events but does not execute actions.

# -----------------------------------------------------------------------------
# Determinability Boundary
# -----------------------------------------------------------------------------
determinability_boundary:
  protocol_facts:
    - "event_payload_existed"
    - "payload_signed_as_specified"
    - "event_hash_matches_signed_event"
    - "actor_key_binding_under_trust_profile"
    - "timestamp_nonce_audience_and_references_present"
    - "critical_extensions_processed"
    - "declared_validation_level_reached"
    - "delegation_termination_observed_in_available_log"
  excluded_facts:
    - "external_truth"
    - "external_target_fact_determinability"
    - "legal_liability"
    - "moral_responsibility"
    - "regulatory_compliance"
    - "authorization_validity_unless_profile_defined"
    - "permission_chain_enforcement"
    - "complete_log_assumption"
    - "causal_chain_or_responsibility_graph_computation"
    - "actual_internal_model_state"
    - "model_intent_or_understanding"
    - "policy_validity_unless_profile_defined"
  notes: "JEP determines protocol-level facts. It does not by itself prove external truth, legal effect, cognitive truth, policy validity, authorization validity, or log completeness. External target-fact determination requires explicit profiles, evidence policies, archival assumptions, and/or chain-composition layers."

# -----------------------------------------------------------------------------
# Profile Boundary
# -----------------------------------------------------------------------------
profile_boundary:
  must_not_redefine:
    - "core_event_verbs"
    - "core_event_object"
    - "signature_semantics"
    - "event_hash_semantics"
    - "core_validation_level_semantics"
    - "failure_code_semantics"
  may_define:
    - "actor_identifier_forms"
    - "key_resolution"
    - "actor_key_binding_rules"
    - "credential_rules"
    - "attestation_rules"
    - "authorization_context_rules"
    - "archival_rules"
    - "chain_rules"
    - "privacy_considerations"
    - "security_considerations"
    - "failure_code_mappings"
  optional_profiles:
    - "did_vc"
    - "x509_pki"
    - "oauth_oidc"
    - "rats_attestation"
    - "local_iam"
    - "hjs_archive"
    - "jac_chain"
    - "blockchain_anchor"
    - "ai_actor"
  notes: "JEP-Core remains neutral. Identity, credential, authorization, attestation, archival, chain, and privacy semantics are profile-defined and must not redefine JEP-Core semantics."

# -----------------------------------------------------------------------------
# Validation Model
# -----------------------------------------------------------------------------
validation_model:
  levels:
    - level: 0
      name: "syntax"
      meaning: "JSON, I-JSON, required fields, schema shape."
    - level: 1
      name: "cryptographic"
      meaning: "JCS canonicalization, event hash, detached signature."
    - level: 2
      name: "actor_binding"
      meaning: "Signing key bound to claimed actor under a trust profile."
    - level: 3
      name: "chain"
      meaning: "References, critical extensions, replay, termination effects, and chain integrity."
    - level: 4
      name: "policy"
      meaning: "Domain, legal, organizational, regulatory, or deployment policy."
  modes:
    - "acceptance"
    - "archival"
    - "chain"
    - "policy"
  notes: "A verifier reports the highest successfully completed validation level. Cryptographic validity must not be presented as policy validity."

# -----------------------------------------------------------------------------
# Extensions (JEP-specific capabilities not in canonical vocabulary)
# -----------------------------------------------------------------------------
extensions:
  - name: "jep_verb"
    description: "The four immutable verbs (J, D, T, V) that structure JEP events."
    values: ["J", "D", "T", "V"]
    notes: "Not promoted to canonical vocabulary in v0.1; may be proposed if other systems adopt similar verb-level semantics."

  - name: "jep_nonce"
    description: "Replay-protection nonce."
    notes: "Protocol security mechanism. Not promoted to canonical vocabulary."

  - name: "jep_ext"
    description: "Extension object for profile-defined or registered extension data."
    notes: "Extensions must not redefine core JEP member semantics."

  - name: "jep_ext_crit"
    description: "Critical extension identifier list."
    notes: "Unknown critical extensions must cause rejection. Unknown non-critical extensions may be ignored."

  - name: "jep_validation_level"
    description: "The highest validation level completed by a verifier."
    values:
      - "0: syntax"
      - "1: cryptographic"
      - "2: actor_binding"
      - "3: chain"
      - "4: policy"
    notes: "Validation levels distinguish syntax, cryptographic validity, actor binding, chain validation, and policy validation."

  - name: "jep_validation_mode"
    description: "Context in which validation is performed."
    values: ["acceptance", "archival", "chain", "policy"]
    notes: "Acceptance validation checks freshness and replay. Archival validation should not reject solely because the event is outside the current freshness window."

  - name: "jep_failure_codes"
    description: "Structured validator failure codes."
    notes: "Failure codes cover syntax, cryptographic, actor/trust, replay/freshness, reference/chain, extension, and policy errors."

  - name: "jep_digest_reference"
    description: "Digest-based reference to claims, credentials, evidence, policies, archives, or external objects."
    notes: "Supports privacy by minimization: sensitive evidence should be referenced by digest or controlled evidence mechanisms rather than embedded by default."

  - name: "jep_trust_profile"
    description: "Profile-defined actor/key binding, algorithm acceptability, credential or attestation use, revocation, historical validity, and policy hooks."
    notes: "Trust profiles are required to interpret actor/key binding and deployment-specific acceptance rules."

# -----------------------------------------------------------------------------
# Verification Endpoints (for round-trip testing)
# -----------------------------------------------------------------------------
verification:
  jwks_url: null  # JEP is a format, not a centralized issuer.
  test_vectors: "https://github.com/hjs-spec/jep/tree/main/test/vectors"
  conformance_draft: "draft-wang-jep-conformance-00"
  verification_tool: "jep verify"
  notes: "Concrete schema, test vectors, reference validator behavior, and baseline conformance classes are maintained outside the crosswalk. This crosswalk should not imply that JEP-Core proves external truth, legal liability, policy validity, log completeness, or actual internal model state."
