# MAINTAINER REVIEW RESOLUTIONS
#
# giskard09's confirmed values, folded into v0.1 on 2026-05-13:
#
#   1. CASING + FIELD NAMES. snake_case confirmed. action_ref and
#      delegation_ref are the wire spellings; folded into signal_types.
#
#   2. SYSTEM METADATA. repo, spec, spec_version, license populated
#      under `system:` (argentum-core, argentum.rgiskard.xyz, 0.4.0, MIT).
#
#   3. ENFORCEMENT_CLASS. advisory confirmed. Mycelium is post-action
#      audit only; the action has already executed before the TrailRecord
#      is signed.
#
#   4. REPLAY_CLASS. decision_replay confirmed. full_replay promotion
#      deferred pending a future wire-shape decision about publishing
#      preimage fields alongside each record.
#
#   5. SYSTEM_ATTRIBUTES. declared at top level: SHA-256 hash family,
#      raw byte concatenation canonicalization (UTF-8 strings + int64
#      big-endian for timestamp_ms), Ed25519 signature capability.
#
#   6. ISSUERS_IN_PRODUCTION. argentum.rgiskard.xyz declared at top
#      level as the live reference implementation under the adopted
#      byte contract. Single issuer for v0.1; additional implementations
#      land in v0.2+ as they appear.
#
#   7. REFUSAL_AUTHORITY. intentionally unset for v0.1. The current
#      vocabulary enum (issuer / verifier / consumer_policy / shared)
#      does not include a value for "refusal happens upstream, before
#      the attestation exists", which is Mycelium's case (refusal sits
#      in APS DelegationGrant validation / gateway preflight before any
#      trail is recorded). Descriptor remains unset pending vocabulary
#      enum extension OR identification of a closer-fit existing value.
# ─────────────────────────────────────────────────
