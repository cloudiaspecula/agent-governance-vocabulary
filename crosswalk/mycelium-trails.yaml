# crosswalk/mycelium-trails.yaml
# =============================================================================
# Bilateral mapping between Mycelium Trails TrailRecord fields and APS
# authority + receipt primitives, anchored on the APS side per giskard09's
# adoption on aeoess/agent-passport-system#1 (2026-05-13 20:41Z).
#
# Mycelium Trails publishes signed TrailRecords for AI-agent actions. Each
# TrailRecord binds an action to an action_ref and a delegation_ref so the
# record is a content-addressed, audit-replayable artifact of who acted
# under whose authority.
#
# Four adoption points captured from giskard09's comment thread:
#
#   1. `action_ref` is SHA-256(agent_id UTF-8 || action_type UTF-8 ||
#      scope UTF-8 || timestamp_ms int64 big-endian).
#   2. `delegation_ref` is sha256(passport_uri || DelegationGrant.signature).
#   3. `delegation_ref: null` for root passport actions (no synthetic root
#      sentinel).
#   4. Multi-agent compositions land as N separate TrailRecords with
#      independent delegation_ref values, not one-to-many inside one record.
#
# Home:        https://argentum.rgiskard.xyz
# Contributor: @giskard09
# Status:      Proposed (v0.1), draft. Mycelium-side semantics, descriptor
#              enforcement, and per-envelope wire fields pending
#              giskard09 confirmation. Draft status maintained until
#              Mycelium-side semantics confirmed on review.
# =============================================================================

system:
  name: Mycelium Trails
  home: https://argentum.rgiskard.xyz
  # repo / spec / spec_version / license pending giskard09 confirmation.
  # Adoption thread only referenced the home URL above; spec and repo
  # URLs were not surfaced in the adoption comment. Maintainer to
  # populate or correct on review.
  role: >
    Signed-trail recording layer for AI-agent actions. Each TrailRecord
    binds an action to a content-addressed action_ref and an authority
    chain via delegation_ref, producing an audit-replayable record of
    who acted under whose authority. Trails are independent per-agent
    artifacts; multi-agent compositions emit one record per agent.
  identity_layer: >
    Caller-provided. Mycelium Trails does not issue or attest agent
    identity; it consumes upstream identity (passport_uri, agent_id) and
    binds it into each TrailRecord. In the adopting integration, the
    upstream identity layer is APS: passport_uri resolves to an APS
    passport and DelegationGrant.signature is the APS-side leaf
    delegation signature.

license: Apache-2.0
maintainer:
  github: giskard09
  confirmed_at: "2026-05-13"

# Cross-references:
#   - APS adoption thread (4 adoption points captured here):
#     aeoess/agent-passport-system#1, giskard09 2026-05-13 20:41Z.
#   - APS-side action_ref reference: agent-passport-system V2 receipt
#     surface in src/v2/types.ts on aeoess/agent-passport-system.
#   - APS-side delegation_ref content-addressed form: APS V2 delegation
#     surface; Mycelium adopts the byte contract
#     `sha256(passport_uri || DelegationGrant.signature)` verbatim.

# ─────────────────────────────────────────────────
# SIGNAL TYPE MAPPINGS
#
# Mycelium Trails maps substantively to one canonical signal_type
# (governance_attestation, structural) with explicit no_mapping rationale
# for the canonicals out of scope for a signed-trail recording layer
# (compliance_risk, wallet_state, settlement_witness, behavioral_trust).
#
# Other canonicals (passport_grade, trust_verification, reasoning_integrity,
# security_posture, job_performance, peer_review, wallet_intelligence,
# completion_ratio, entity_continuity) are not in scope for v0.1 and
# will be addressed in follow-up only if Mycelium produces or consumes
# those primitives directly.
# ─────────────────────────────────────────────────
signal_types:

  governance_attestation:
    mycelium_term: "TrailRecord"
    mycelium_fields:
      # Field-name spellings (snake_case `action_ref` / `delegation_ref`)
      # match giskard09's adoption comment verbatim. Confirm on review
      # that the Mycelium wire shape uses the same casing.
      - "action_ref ← SHA-256(agent_id UTF-8 || action_type UTF-8 || scope UTF-8 || timestamp_ms int64 big-endian)"
      - "delegation_ref ← sha256(passport_uri || DelegationGrant.signature)"
      - "delegation_ref: null for root passport actions (no synthetic root sentinel)"
      - "Multi-agent composition: N×TrailRecord with independent delegation_ref values per record"
    mycelium_definition: >
      A TrailRecord is a signed governance attestation that records an
      AI-agent action and its authority chain. The four adoption points
      above pin the bilateral byte contract with APS: every Mycelium
      TrailRecord uses the same action_ref and delegation_ref byte
      computation as APS, so a consumer can content-address-match
      Mycelium records against APS-produced authority records (and vice
      versa) without re-deriving identifiers.
    match: structural
    divergence: >
      The action_ref and delegation_ref byte forms are intentionally
      identical to APS by adoption. The surrounding TrailRecord envelope
      is Mycelium-specific (the APS-side envelopes are DelegationGrant
      and PaymentReceipt). Two systems sharing the same content-
      addressing primitives can cross-join records without coordinating
      identifier schemes.
    notes: >
      v0.1 captures the four adoption points only. Per-envelope wire
      fields, signature semantics, and descriptor enforcement_class
      land in a follow-up after giskard09 confirms Mycelium-side
      semantics. This crosswalk does NOT claim production integration;
      it captures the byte-contract alignment so future cross-system
      replay and audit join paths can be built against a stable, shared
      identifier surface.
    issuers_in_production:
      # TODO(giskard09): confirm whether the reference implementation at
      # argentum.rgiskard.xyz is the production issuer, and whether
      # additional implementations are in flight.
      - "Mycelium Trails reference implementation (https://argentum.rgiskard.xyz)"
    cross_references:
      - "APS adoption thread (4-point byte-contract adoption): aeoess/agent-passport-system#1, giskard09 2026-05-13 20:41Z"

  compliance_risk:
    mycelium_term: null
    match: no_mapping
    notes: >
      Mycelium Trails records discrete, definitive TrailRecords per
      action; it does not emit scored compliance-risk assessments. A
      downstream consumer could derive risk signals from aggregated
      TrailRecord patterns, but Mycelium itself does not produce that
      primitive.

  wallet_state:
    mycelium_term: null
    match: no_mapping
    notes: >
      Mycelium Trails is wallet-agnostic. TrailRecords reference agents
      by agent_id and the passport_uri-derived delegation_ref, not by
      on-chain wallet binding. Wallet state belongs to the upstream
      identity layer (APS, did:agent methods).

  settlement_witness:
    mycelium_term: null
    match: no_mapping
    notes: >
      Mycelium Trails records action lineage and authority; it does not
      witness external financial settlement. A TrailRecord may LINK to
      a settlement event via its action_ref, but Mycelium itself is not
      a settlement_witness issuer.

  behavioral_trust:
    mycelium_term: null
    match: no_mapping
    notes: >
      Mycelium Trails records action attestations, not task-class
      behavioral-trust derivations. Aggregated TrailRecord patterns
      could feed a downstream behavioral_trust issuer, but Mycelium
      itself does not produce that primitive.

# ─────────────────────────────────────────────────
# DESCRIPTOR DIMENSIONS
#
# Top-level nested-per-signal shape. v0.1 ships conservative defaults for
# governance_attestation; values may shift on giskard09's review of
# Mycelium-side enforcement and replay semantics.
# ─────────────────────────────────────────────────
descriptor_dimensions:
  governance_attestation:
    enforcement_class: advisory
    note_enforcement: >
      v0.1 default. TrailRecords are post-action audit artifacts
      mirroring APS PaymentReceipts: the action ran before the trail
      signs; the trail is the audit record, not a runtime refusal gate.
      Promote to `binding` if Mycelium also gates execution at action
      issuance time.

    validity_temporal: at_processing
    note_validity: >
      v0.1 default. The action_ref binds a timestamp_ms field so the
      record self-pins to its action time; the TrailRecord is valid
      from issuance and persistent thereafter. Confirm on review
      whether Mycelium also enforces a TTL or validity window beyond
      this anchor.

    invariant_survival: post_action
    note_invariant: >
      A signed TrailRecord survives post-action. Content-addressed
      action_ref and delegation_ref provide a stable join key for
      future cross-system replay.

    replay_class: full_replay
    note_replay: >
      Content-addressed action_ref and delegation_ref make each
      TrailRecord standalone-verifiable from canonical bytes plus the
      issuer's public key, provided the input fields (agent_id,
      action_type, scope, timestamp_ms; passport_uri,
      DelegationGrant.signature) are recoverable alongside the trail.
      Confirm on review that Mycelium publishes the input fields
      together with each record; without them, replay degrades to
      `decision_replay`.

    governed_action_class: ["read", "write", "transfer", "delegate", "publish", "compose"]
    note_governed: >
      Mycelium Trails is action-class agnostic; callers declare
      action_type per record. All six canonical governed_action_class
      values can be expressed.

# ─────────────────────────────────────────────────
# REVIEW NOTES
#
# Open questions for @giskard09 on review:
#
#   1. CASING + FIELD NAMES. The adoption comment used snake_case
#      `action_ref` / `delegation_ref`. Confirm the Mycelium TrailRecord
#      wire schema uses the same casing (or correct to camelCase if not).
#
#   2. SYSTEM METADATA. Public spec URL, repo URL, spec version, and
#      Mycelium's own license were not surfaced in the adoption thread.
#      Please populate `system.repo`, `system.spec`, `system.spec_version`,
#      `system.license` on review.
#
#   3. ENFORCEMENT_CLASS. v0.1 assumes Mycelium is a post-action audit
#      layer (advisory). Confirm or correct to `binding` if Mycelium also
#      gates execution at issuance.
#
#   4. REPLAY_CLASS. `full_replay` assumes Mycelium publishes the
#      action_ref / delegation_ref input fields alongside each trail so
#      consumers can re-derive the hash and verify standalone. Confirm
#      the wire shape includes those fields.
#
#   5. SYSTEM_ATTRIBUTES. signature_capability, canonicalization_profile,
#      and hash_family are not declared in v0.1. Per vocabulary
#      convention these should declare together; please add once the
#      Mycelium-side signing and canonicalization details are confirmed.
#
#   6. ISSUERS_IN_PRODUCTION. Confirm whether argentum.rgiskard.xyz is the
#      production reference implementation issuing under the adopted byte
#      contract, and list any additional implementations.
#
#   7. REFUSAL_AUTHORITY. Not declared in v0.1. The current vocabulary
#      enum (issuer / verifier / consumer_policy / shared) does not
#      include a value for "refusal happens upstream, before the
#      attestation exists", which is Mycelium's case (refusal sits in
#      APS DelegationGrant validation / gateway preflight before any
#      trail is recorded). Leaving the descriptor unset until either
#      the enum is extended or a closer-fit value is identified.
# ─────────────────────────────────────────────────
